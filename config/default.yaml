capDesignToGenome:
  HpreCap: shortname
CAPTURE: false
GENOMESDIR: data/fasta/
DATADIR: data/fastq/
produceStatPlots: false
produceTrackHub: false
produceHtmlStatsTable: false
SAMPLE_ANNOT: data/sample_annotations.tsv
sampleRepGroupBy:
  - seqPlatform
  - cellLine
USE_MATCHED_ILLUMINA: false
PROJECT_NAME: shortname_jan
genomeToCAGEpeaks:
  shortname: data/input/fakeCAGE.bed
genomeToAnnotGtf:
  shortname: data/input/Annotation.gtf
genomeToDHSpeaks:
  shortname: data/input/fakeDHS.bed
minimumTmergeReadSupport:
  - "2"
exonOverhangTolerance: "8"
# grep -P regex matching spike-in contig names to drop from track hub outputs.
# Real chromosomes are detected from the genome/BAM reference names themselves,
# so no "chr" prefix is assumed. Override if your spike-ins are named differently.
spikeInContigRegex: "^(ERCC|SIRV|chrIS)"
